[server]
host = "0.0.0.0"
port = 8080
log_level = "INFO"

[bot]
mode = "live"
default_cycle_ms = 3000
enabled_pairs = ["USDG_USDT", "TEL_USD"]
adaptive_tuning = false
adaptive_interval_sec = 90
adaptive_min_sample_sells = 10
adaptive_lookback_sells = 30
adaptive_target_win_pct = 48
adaptive_win_band_pct = 8
adaptive_spread_step_bps = 2
adaptive_spread_floor_bps = 2
adaptive_spread_ceiling_bps = 120
learner_enabled = true
learner_interval_sec = 60
learner_min_samples = 5
learner_max_daily_adjustments = 50
learner_loss_lookback_sells = 5
learner_widen_on_avg_loss = true
learner_lookback_max_age_sec = 3600
decay_start_sec = 90
decay_interval_sec = 60
decay_step_bps = 1
pain_floor_decay_hours = 4
momentum_hold_sells = 2
momentum_hold_sec = 60
per_trade_profitability = false
min_quote_half_spread_bps = 2
min_total_pnl_usd = -15.0
daily_profit_target_usd = 20.0
daily_loss_limit_usd = 15.0
max_drawdown_pct = 20.0
threat_imbalance_threshold = 0.5
threat_spread_blowout_ratio = 2.0
threat_velocity_bps = 15.0
threat_critical_velocity_bps = 50.0
threat_spread_multiplier = 1.5
depeg_threshold_bps = 50

# spread_bps = HALF-width from microprice (one side). Total quoted width ≈ 2×.
# per_trade_profitability = true floors the half-spread at (maker_fee + 4 bps)
# so even spread_bps = 8 gets floored above fees at the current volume tier.
#
# Kraken spot_crypto maker fee: 25 bps ($0+) → 20 ($10K+) → 14 ($50K+) → ...
# The bot auto-resolves from 30-day volume; fee_bps is just a static fallback.

# --- USDG/USDT: 0% maker, 0.01% taker. $510K daily vol, 5bps spread, 9bps range.
# Inventory: 156 USDG + 217 USDT (shared w/ XRP). Best spread pair.
[pairs.USDG_USDT]
symbol = "USDG/USDT"
spread_bps = 2
order_size = 30.0
max_inventory = 200.0
fee_bps = 0
fee_schedule = "usdg"
spread_floor_bps = 1

# --- XRP/USDT: 25bps maker (spot_crypto). $1.6M daily vol, 2bps natural spread.
# Inventory: 60 XRP + 217 USDT (shared w/ USDG). Wide spread but liquid.
[pairs.XRP_USDT]
symbol = "XRP/USDT"
spread_bps = 8
order_size = 15.0
max_inventory = 100.0
fee_bps = 25
fee_schedule = "spot_crypto"
spread_floor_bps = 8

# --- TEL/USD: maker_rebate 23bps. $30K daily vol, 4.8bps spread.
# Inventory: 450K TEL + ~$0 USD. Sell-only initially; USD grows from sells.
[pairs.TEL_USD]
symbol = "TEL/USD"
spread_bps = 30
order_size = 50000.0
max_inventory = 500000.0
cycle_ms = 3000
fee_bps = 23
fee_schedule = "maker_rebate"
spread_floor_bps = 10

