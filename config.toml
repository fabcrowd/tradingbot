per_trade_profitability = false   # disabled: 0% fee pairs (USDG) — margin bps push sell to 1.0002
min_quote_half_spread_bps = 1
min_total_pnl_usd = -10.0
daily_profit_target_usd = 20.0
daily_loss_limit_usd = 10.0
max_drawdown_pct = 20.0
rate_limit_order_per_sec = 10
rate_limit_burst = 20
threat_quoting_pause = true
abort_on_withdraw_permission = false
trailing_stop_enabled = false
trailing_stop_pct = 50
take_profit_usd = 10.0
oco_enabled = false
oco_stop_bps = 30
oco_tp_bps = 30
twap_enabled = false
twap_slice_count = 5
twap_duration_sec = 30
btd_enabled = false
btd_sma_short = 20
btd_sma_long = 60
btd_levels = 3
btd_step_bps = 20
btd_size_multiplier = 1.5
optimizer_enabled = false
optimizer_interval_sec = 900
optimizer_train_hours = 4
optimizer_holdout_pct = 0.25
optimizer_max_delta_spread_bps = 6
optimizer_max_delta_size_pct = 50
optimizer_min_fills = 20
optimizer_objective = "total_dollar_wins"

# --- Hummingbot-inspired strategies ---
ping_pong_enabled = true
hanging_orders_enabled = true
hanging_orders_cancel_pct = 1.0
triple_barrier_enabled = true
tb_stop_pct = 2.0
tb_tp_pct = 1.5
tb_max_hold_sec = 3600

# --- Consecutive loss protection ---
consecutive_loss_halt_count = 3
consecutive_loss_pause_sec = 300

# --- Time-based quoting (disabled until bot is stable) ---
time_quoting_enabled = false
time_peak_start_utc = 13
time_peak_end_utc = 21
time_normal_multiplier = 1.15
time_offpeak_multiplier = 1.35
time_offpeak_size_pct = 50.0

# --- Market observation warmup ---
warmup_sec = 30
warmup_buy_percentile = 25

# --- MEV / Bot Detection ---
mev_detection_enabled = true
mev_bot_widen_scale = 0.15         # max 15% wider when heavy bot competition (stay competitive)
mev_arb_widen_scale = 0.25         # max 25% wider when arb bots active (Phase 2)
mev_clean_tighten_scale = 0.10     # up to 10% tighter when market is clean (reward for intelligence)
mev_bot_score_threshold = 0.65     # raised from 0.5 — oscillating scores of 0.3-0.6 were flipping every tick
mev_detector_window_sec = 120.0    # widened from 60s for smoother signals on thin books
mev_eigenphi_enabled = false       # Phase 2: on-chain MEV data
mev_mempool_feed_enabled = false   # Phase 2: mempool monitoring

threat_imbalance_threshold = 0.5
threat_spread_blowout_ratio = 2.0
threat_velocity_bps = 15.0
threat_critical_velocity_bps = 50.0
threat_spread_multiplier = 1.5
depeg_threshold_bps = 50

# spread_bps = HALF-width from microprice (one side). Total quoted width ≈ 2×.
# per_trade_profitability = true floors the half-spread at (maker_fee + 4 bps)
# so even spread_bps = 8 gets floored above fees at the current volume tier.
#
# Kraken spot_crypto maker fee: 25 bps ($0+) → 20 ($10K+) → 14 ($50K+) → ...
# The bot auto-resolves from 30-day volume; fee_bps is just a static fallback.

# --- USDG/USDT: 0% maker, 0.01% taker. $510K daily vol, 5bps spread, 9bps range.
# Inventory: 156 USDG + 217 USDT (shared w/ XRP). Best spread pair.
# --- USDG/USDT: 0% maker, 0.01% taker. Market spread ~1 bps. Massive resting liquidity.
# half-spread=1 bps → total ~2 bps. At 0% maker fee any spread > 0 is profit.
# Must quote at or near top-of-book to get filled in this thick book.
[pairs.USDG_USDT]
symbol = "USDG/USDT"
spread_bps = 1
order_size = 10.0
max_inventory = 0
fee_bps = 0
fee_schedule = "usdg"
spread_floor_bps = 1
min_order_qty = 5.0

